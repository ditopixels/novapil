        const sha256Hex = async (input) => {
            const encoded = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest("SHA-256", encoded);
            return Array.from(new Uint8Array(hashBuffer)).map((b) => b.toString(16).padStart(2, "0")).join("");
        };

        const startWompiCheckout = async (product) => {
            if (!WOMPI_CONFIG.publicKey.startsWith("pub_")) {
                window.alert("Configura WOMPI_CONFIG.publicKey con tu llave pública de Wompi.");
                return;
            }

            if (!WOMPI_CONFIG.integritySecret || WOMPI_CONFIG.integritySecret.includes("REEMPLAZAR")) {
                window.alert("Configura WOMPI_CONFIG.integritySecret para generar la firma en frontend.");
                return;
            }

            const expirationTime = new Date(Date.now() + 10 * 60 * 1000).toISOString();
            const reference = `NOVAPIL-${product.id}-${Date.now()}`;
            const amountInCents = product.price * 100;

            const signatureChain = `${reference}${amountInCents}COP${expirationTime}${WOMPI_CONFIG.integritySecret}`;
            const integrity = await sha256Hex(signatureChain);

            const form = document.createElement("form");
            form.method = "GET";
            form.action = WOMPI_CONFIG.checkoutBase;

            const fields = {
                "public-key": WOMPI_CONFIG.publicKey,
                currency: "COP",
                "amount-in-cents": String(amountInCents),
                reference,
                "signature:integrity": integrity,
                "redirect-url": WOMPI_CONFIG.redirectUrl,
                "expiration-time": expirationTime
            };

            Object.entries(fields).forEach(([name, value]) => {
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = name;
                input.value = value;
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
            form.remove();
        };
