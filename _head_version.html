    const PRODUCTS = [

        image: "assets/HAIRCLINIC0353.jpg.webp",

      {

        shortCode: "P2",
        name: "CHAMPU ANTICAIDA (NUTRICION Y FORTALECIMIENTO)",
        price: 109000,
        sku: "NOVA-P2-ANTI",
        image: "assets/HAIRCLINIC0364.jpg.webp",
        gallery: [
          "assets/HAIRCLINIC0364.jpg.webp",
          "assets/HAIRCLINIC0402.jpg.webp",
          "assets/HAIRCLINIC0399.jpg.webp"
        ],
        title: "Sientes que cada dia tienes menos cabello?",
        subtitle: "No esperes a que la caida avance.",

        ]

        price: 120000,
        sku: "NOVA-P3-LOC5",

        bullets: [

          "Quieres complementar tu tratamiento capilar con una solucion de uso diario."
        ]

    function formatPrice(cop) {
      return new Intl.NumberFormat("es-CO", {
        style: "currency",
        currency: "COP",
        maximumFractionDigits: 0
      }).format(cop);
    }

    async function startWompiCheckout(product) {
      if (!WOMPI_CONFIG.publicKey.includes("pub_")) {
        window.alert("Configura WOMPI_CONFIG.publicKey con tu llave de Wompi.");
        return;
      }

      const expirationTime = new Date(Date.now() + 10 * 60 * 1000).toISOString();
      const reference = `${product.sku}-${Date.now()}`;
      const amountInCents = product.price * 100;

      try {
        const response = await fetch(WOMPI_CONFIG.signatureEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            reference,
            amountInCents,
            currency: "COP",
            expirationTime,
            productId: product.id
          })
        });

        if (!response.ok) {
          throw new Error("No se pudo obtener la firma de integridad.");
        }

        const { signature } = await response.json();

        if (!signature) {
          throw new Error("Respuesta de firma invalida.");
        }

        const params = new URLSearchParams({
          "public-key": WOMPI_CONFIG.publicKey,
          currency: "COP",
          "amount-in-cents": String(amountInCents),
          reference,
          "signature:integrity": signature,
          "redirect-url": WOMPI_CONFIG.redirectUrl,
          "expiration-time": expirationTime
        });

        window.location.href = `${WOMPI_CONFIG.checkoutBase}?${params.toString()}`;
      } catch (err) {
        console.error(err);
        window.alert("No fue posible iniciar el checkout. Verifica el endpoint de firma en backend.");
      }
    }

    function ProductJsonLd() {
      const json = {
        "@context": "https://schema.org",
        "@type": "ItemList",
        itemListElement: PRODUCTS.map((p, i) => ({
          "@type": "ListItem",
          position: i + 1,
          item: {
            "@type": "Product",
            name: p.name,
            image: `https://novapil.com.co/${p.image}`,
            sku: p.sku,
            brand: { "@type": "Brand", name: "Novapil MD" },
            offers: {
              "@type": "Offer",
              priceCurrency: "COP",
              price: p.price,
              availability: "https://schema.org/InStock",
              url: `https://novapil.com.co/producto/${p.id}`
            }
          }
        }))
      };

      return <script type="application/ld+json" dangerouslySetInnerHTML={{ __html: JSON.stringify(json) }} />;
    }

      return (

              <Link to="/" className="flex items-center gap-3">

                  <p className="text-base font-extrabold text-sky-900 leading-none mt-1">Novapil MD</p>
                </div>
              </Link>

              <nav className="hidden md:flex items-center gap-8">
                <a href="#productos" className={navClass}>Productos</a>
                <a href="#beneficios" className={navClass}>Beneficios</a>
                <a href="#soporte" className={navClass}>Soporte</a>
              </nav>

              <div className="hidden md:block">
                <a href="#productos" className="inline-flex items-center rounded-full bg-sky-700 hover:bg-sky-800 px-5 py-2.5 text-white text-sm font-bold shadow">
                  Comprar ahora
                </a>
              </div>

              <button
                type="button"
                className="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-lg border border-slate-300"
                onClick={() => setMenuOpen((prev) => !prev)}
                aria-label="Abrir menu"
                aria-expanded={menuOpen}
              >
                <span className="text-xl">{menuOpen ? "x" : "="}</span>
              </button>
            </div>
          </div>

          <div className={`md:hidden mobile-menu ${menuOpen ? "open" : ""} border-t border-slate-200`}>
            <div className="px-4 py-4 space-y-3 bg-white/95">
              <a href="#productos" onClick={closeMenu} className="block text-sm font-semibold text-slate-700">Productos</a>
              <a href="#beneficios" onClick={closeMenu} className="block text-sm font-semibold text-slate-700">Beneficios</a>
              <a href="#soporte" onClick={closeMenu} className="block text-sm font-semibold text-slate-700">Soporte</a>
              <a href="#productos" onClick={closeMenu} className="inline-flex rounded-full bg-sky-700 px-4 py-2 text-white text-sm font-bold">Comprar ahora</a>
            </div>
          </div>
        </header>
      );
    }

    function Footer() {

                {[

    function ProductPage() {

              <p className="mt-3 text-base text-slate-600 leading-relaxed">{product.copy}</p>

              <div className="mt-6 p-5 bg-sky-50 border border-sky-100 rounded-2xl">

                <ul className="mt-3 space-y-2 text-sm text-slate-700">

                    <li key={bullet}>- {bullet}</li>

              </div>

              <div className="mt-8 flex flex-wrap items-center gap-4">

              <p className="mt-4 text-xs text-slate-500 leading-relaxed">

              </p>
            </div>
          </section>
        </main>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header />
          <Routes>
            <Route path="/" element={<HomePage />} />
            <Route path="/producto/:id" element={<ProductPage />} />
          </Routes>
          <Footer />
        </React.Fragment>
      );
    }

    const root = createRoot(document.getElementById("root"));
    root.render(
      <HashRouter>

</body>
